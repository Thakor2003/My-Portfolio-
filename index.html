
<!DOCTYPE html>
<html>
<head>
  <title>Sanjay Portfolio</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
  <a href="#">🏠</a>
  <a href="#skills">⚡</a>
  <a href="#projects">📂</a>
  <a href="#contact">📩</a>
</div>

<!-- Hero Section -->
<div class="hero">
  <img src="profile.jpg" class="profile">
  <h1>Hi, I'm <span>Sanjay</span></h1>
  <h2 id="typing"></h2>
  <p>Building modern web experiences 🚀</p>

  <button onclick="scrollToSection('projects')">View My Work</button>
  <a href="resume.pdf" download><button>Download CV</button></a>
</div>

<!-- Skills -->
<div id="skills" class="section">
  <h2>⚡ My Skills</h2>

  <div class="bar"><span style="width:90%">HTML</span></div>
  <div class="bar"><span style="width:85%">CSS</span></div>
  <div class="bar"><span style="width:75%">Python</span></div>
  <div class="bar"><span style="width:70%">Java</span></div>

</div>

<!-- Projects -->
<div id="projects" class="section">
  <h2>📂 My Portfolio</h2>

  <div class="projects">

    <div class="card" onclick="window.open('https://github.com/Thakor2003')">
      <img src="project1.jpg">
      <p>AI Traffic System</p>
    </div>

    <div class="card" onclick="window.open('https://github.com/Thakor2003')">
      <img src="project2.jpg">
      <p>E-commerce Website</p>
    </div>

  </div>
</div>

<!-- Contact -->
<div id="contact" class="section">
  <h2>📩 Contact</h2>

  <form action="https://formspree.io/f/mgopkndb" method="POST">
    <input type="text" name="name" placeholder="Name" required>
    <input type="email" name="email" placeholder="Email" required>
    <textarea name="message" placeholder="Message"></textarea>
    <button type="submit">Send</button>
  </form>
</div>

<script>
let text = "Web Developer | Cybersecurity Enthusiast";
let i = 0;
function typing(){
  if(i < text.length){
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(typing, 40);
  }
}
typing();

function scrollToSection(id){
  document.getElementById(id).scrollIntoView({behavior:'smooth'});
}
</script>

</body>
</html>
