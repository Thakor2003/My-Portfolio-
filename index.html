<!DOCTYPE html>
<html>
<head>
    <title>Sanjay Pro Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
    <a href="#home">🏠</a>
    <a href="#skills">⚡</a>
    <a href="#projects">📂</a>
    <a href="#contact">📩</a>
</div>

<button onclick="toggleTheme()" class="toggle">🌙</button>

<!-- Hero -->
<section id="home" class="hero">
    <img src="profile.jpg">
    <h1>Hi, I'm <span>Sanjay</span></h1>
    <h2>Web Developer</h2>
    <p>I create modern websites & love cybersecurity</p>
</section>

<!-- Skills -->
<section id="skills" class="card">
    <h2>⚡ Skills</h2>

    <div class="skill">
        <p>HTML</p>
        <div class="bar"><div style="width:90%"></div></div>
    </div>

    <div class="skill">
        <p>CSS</p>
        <div class="bar"><div style="width:85%"></div></div>
    </div>

    <div class="skill">
        <p>JavaScript</p>
        <div class="bar"><div style="width:70%"></div></div>
    </div>

</section>

<!-- Projects -->
<section id="projects" class="card">
    <h2>📂 Projects</h2>

    <div class="project-card" onclick="window.open('https://github.com/Thakor2003')">
        <img src="project1.jpg">
        <p>🚦 AI Traffic System</p>
    </div>

    <div class="project-card" onclick="window.open('https://github.com/Thakor2003')">
        <img src="project2.jpg">
        <p>🛒 E-commerce Website</p>
    </div>

</section>

<!-- Contact -->
<section id="contact" class="card">
    <h2>📩 Contact</h2>

    <form action="https://formspree.io/f/mgopkndb" method="POST">
        <input type="text" name="name" placeholder="Your Name" required>
        <input type="email" name="email" placeholder="Your Email" required>
        <textarea name="message" placeholder="Message"></textarea>
        <button type="submit">Send</button>
    </form>

    <div class="links">
        <a href="https://github.com/Thakor2003">GitHub</a>
        <a href="#">LinkedIn</a>
        <a href="#">Instagram</a>
        <a href="resume.pdf" download>Resume</a>
    </div>
</section>

<script>
function toggleTheme() {
    document.body.classList.toggle("light");
}
</script>

</body>
</html>
